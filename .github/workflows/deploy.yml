name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  AR_REPO: baseball-scraper
  IMAGE: scrape-baseball
  JOB_NAME: scrape-baseball-daily

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set gcloud project
        run: gcloud config set project ${{ vars.GCP_PROJECT_ID }}

      # Helpful debug step (optional but recommended)
      - name: Verify gcloud configuration
        run: gcloud config list

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_PATH="${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}"
          docker build -t "${IMAGE_PATH}:${{ github.sha }}" -t "${IMAGE_PATH}:latest" .
          docker push "${IMAGE_PATH}:${{ github.sha }}"
          docker push "${IMAGE_PATH}:latest"

      - name: Deploy Cloud Run Job
        run: |
          IMAGE_PATH="${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"

          gcloud run jobs update ${{ env.JOB_NAME }} \
            --image "${IMAGE_PATH}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},BQ_DATASET=baseball,SCRAPE_BACKEND=bigquery" \
          || gcloud run jobs create ${{ env.JOB_NAME }} \
            --image "${IMAGE_PATH}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --task-timeout=3600 \
            --max-retries=1 \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},BQ_DATASET=baseball,SCRAPE_BACKEND=bigquery"
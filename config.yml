default:
  database:
    host: "localhost"
    port: 5432
    dbname: "baseball"
    user: "postgres"
    password: !expr Sys.getenv("BASEBALL_DB_PASSWORD")
  scraping:
    levels:
      - "MLB"
      - "AAA"
      - "AA"
      - "A+"
      - "A"
    game_types:
      - "R"
    parallel_cores: 4
    chunk_days: 7
  logging:
    level: "INFO"
    file: "logs/scrape.log"

default:
  database:
    host: "localhost"
    port: 5432
    dbname: "baseball"
    user: "postgres"
    password: !expr Sys.getenv("BASEBALL_DB_PASSWORD")
  bigquery:
    project: !expr Sys.getenv("GCP_PROJECT_ID")
    dataset: !expr Sys.getenv("BQ_DATASET", unset = "baseball")
  scraping:
    levels:
      - "MLB"
      - "AAA"
      - "AA"
      - "A+"
      - "A"
    game_types:
      - "S"
      - "E"
      - "A"
      - "R"
      - "F"
      - "D"
      - "L"
      - "W"
      - "C"
    parallel_cores: 4
    chunk_days: 7
  logging:
    level: "INFO"
    file: "logs/scrape.log"
